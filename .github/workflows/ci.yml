name: Playwright and API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # ============================================================
    # MYSQL SERVICE
    # ============================================================

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: shopkart
          MYSQL_USER: shopkart
          MYSQL_PASSWORD: shopkart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:

      # ============================================================
      # 1. CHECKOUT REPOSITORIES
      # ============================================================

      # Checkout Testing Repository
      - name: Checkout Testing Repository
        uses: actions/checkout@v4

      # Checkout ShopKart Application Repository
      - name: Checkout ShopKart Application
        uses: actions/checkout@v4
        with:
          repository: jaisingh-builds/sdet-retail-app
          ref: shopkart
          path: sdet-retail-app


      # ============================================================
      # 2. SHOPKART APPLICATION SETUP
      # ============================================================

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install ShopKart Root Dependencies
      - name: Install ShopKart Root Dependencies
        working-directory: ./sdet-retail-app
        run: npm install

      # Install ShopKart Frontend Dependencies
      - name: Install ShopKart Frontend Dependencies
        working-directory: ./sdet-retail-app/frontend
        run: npm install

      # Install ShopKart Backend Dependencies
      - name: Install ShopKart Backend Dependencies
        working-directory: ./sdet-retail-app/backend
        run: npm install

      # Create ShopKart Environment File
      - name: Create ShopKart .env
        working-directory: ./sdet-retail-app
        run: |
          cp .env.example .env

          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_NAME=shopkart" >> .env
          echo "DB_USER=shopkart" >> .env
          echo "DB_PASSWORD=shopkart" >> .env

          echo "SHOPKART_ALICE_PASSWORD=${{ secrets.SHOPKART_ALICE_PASSWORD }}" >> .env
          echo "SHOPKART_BOB_PASSWORD=${{ secrets.SHOPKART_BOB_PASSWORD }}" >> .env
          echo "SHOPKART_CAROL_PASSWORD=${{ secrets.SHOPKART_CAROL_PASSWORD }}" >> .env

      # Verify MySQL Connection
      - name: Verify MySQL Connection
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 \
            -u shopkart \
            -pshopkart \
            -e "SHOW DATABASES;"

      # Verify Vite Installation
      - name: Verify Vite Installation
        working-directory: ./sdet-retail-app/frontend
        run: npx vite --version

      # Start ShopKart Application
      - name: Start ShopKart Application
        working-directory: ./sdet-retail-app
        run: |
          chmod +x scripts/shopkart-start.sh
          ./scripts/shopkart-start.sh > app.log 2>&1 &
          sleep 30
          cat app.log


      # ============================================================
      # 3. PLAYWRIGHT UI TEST SETUP
      # ============================================================

      # Install Playwright Dependencies
      - name: Install Playwright Dependencies
        working-directory: ./PlaywrightTests
        run: npm install

      # Create Playwright Environment File
      - name: Create Playwright .env
        working-directory: ./PlaywrightTests
        run: |
          touch .env
          echo "BASEURL=http://localhost:8080" >> .env
          echo "SHOPKART_ALICE_PASSWORD=${{ secrets.SHOPKART_ALICE_PASSWORD }}" >> .env

      # Wait Until ShopKart Application Is Available
      - name: Wait for ShopKart Application
        working-directory: ./PlaywrightTests
        run: npx wait-on http://localhost:8080 --timeout 180000

      # Install Playwright Browsers
      - name: Install Playwright Browsers
        working-directory: ./PlaywrightTests
        run: npx playwright install --with-deps


      # ============================================================
      # 4. RUN PLAYWRIGHT UI TESTS
      # ============================================================

      - name: Run Playwright UI Tests
        working-directory: ./PlaywrightTests
        run: npx playwright test


      # ============================================================
      # 5. GRADLE API TEST SETUP
      # ============================================================

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22

      # Setup Gradle
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Generate Gradle Wrapper
      - name: Generate Gradle Wrapper
        working-directory: ./apitesting
        run: gradle wrapper

      # Grant Gradle Wrapper Execute Permission
      - name: Grant Gradle Execute Permission
        working-directory: ./apitesting
        run: chmod +x gradlew


      # ============================================================
      # 6. RUN GRADLE API TESTS
      # ============================================================

      - name: Run Gradle API Tests
        working-directory: ./apitesting
        run: ./gradlew clean test --console=plain --no-daemon


      # ============================================================
      # 7. UPLOAD TEST REPORTS
      # ============================================================

      # Upload Playwright HTML Report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: PlaywrightTests/playwright-report/
          retention-days: 30

      # Upload Gradle API Test Report
      - name: Upload API Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: apitesting/build/reports/tests/test/
          retention-days: 30