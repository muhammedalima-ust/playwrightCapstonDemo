name: TripStack CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  CI: "true"

jobs:
  ui-tests:
    name: Playwright UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PlaywrightTests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run UI + resilience + performance tests
        env:
          MUHAMMED_BASEURL: ${{ secrets.MUHAMMED_BASEURL }}
          MUHAMMED_VICTOR_PASSWORD: ${{ secrets.MUHAMMED_VICTOR_PASSWORD }}
          MUHAMMED_VICTOR_CARD_NUMBER: ${{ secrets.MUHAMMED_VICTOR_CARD_NUMBER }}
          MUHAMMED_VICTOR_CARD_EXPIRY: ${{ secrets.MUHAMMED_VICTOR_CARD_EXPIRY }}
          MUHAMMED_VICTOR_CARD_CVV: ${{ secrets.MUHAMMED_VICTOR_CARD_CVV }}
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: PlaywrightTests/playwright-report
          retention-days: 14

  api-core:
    name: RestAssured/JDBC — core + DB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apitesting
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
      - name: Run BaseTest + DB tests
        env:
          MUHAMMED_EMP_ID: ${{ secrets.MUHAMMED_EMP_ID }}
          MUHAMMED_VICTOR_PASSWORD: ${{ secrets.MUHAMMED_VICTOR_PASSWORD }}
          MUHAMMED_DB_USERNAME: ${{ secrets.MUHAMMED_DB_USERNAME }}
          MUHAMMED_DB_PASSWORD: ${{ secrets.MUHAMMED_DB_PASSWORD }}
        run: ./gradlew test --tests "com.apitesting.tests.BaseTest" --tests "com.apitesting.tests.DBTest"
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-core
          path: apitesting/build/allure-results
          retention-days: 14

  api-security:
    name: Security gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apitesting
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
      - name: Run security tests
        env:
          MUHAMMED_EMP_ID: ${{ secrets.MUHAMMED_EMP_ID }}
          MUHAMMED_VICTOR_PASSWORD: ${{ secrets.MUHAMMED_VICTOR_PASSWORD }}
          MUHAMMED_BOB_PASSWORD: ${{ secrets.MUHAMMED_DAVE_PASSWORD }}
        run: ./gradlew test --tests "com.apitesting.tests.SecurityNegativesTest"
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-security
          path: apitesting/build/allure-results
          retention-days: 14

  merge-gate:
    name: Merge gate (all must pass)
    needs: [ ui-tests, api-core, api-security ]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All gates green — safe to merge."